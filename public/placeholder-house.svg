<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="House placeholder">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE4D6"/>
      <stop offset="60%" stop-color="#FFC9A8"/>
      <stop offset="100%" stop-color="#FFB088"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#86B47A"/>
      <stop offset="100%" stop-color="#5C8E52"/>
    </linearGradient>
    <linearGradient id="house" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8EEF3"/>
    </linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D9534F"/>
      <stop offset="100%" stop-color="#B23A36"/>
    </linearGradient>
    <linearGradient id="window" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7BB1D1"/>
      <stop offset="100%" stop-color="#4A7E9E"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="600" fill="url(#sky)"/>

  <!-- Distant sun -->
  <circle cx="640" cy="130" r="38" fill="#FFE49B" opacity="0.9"/>
  <circle cx="640" cy="130" r="22" fill="#FFD66B"/>

  <!-- Distant hills -->
  <path d="M 0 420 Q 200 360 380 400 T 800 380 L 800 600 L 0 600 Z" fill="#A8C39E" opacity="0.7"/>
  <path d="M 0 450 Q 250 400 480 440 T 800 420 L 800 600 L 0 600 Z" fill="#7FA872" opacity="0.85"/>

  <!-- Ground -->
  <rect y="460" width="800" height="140" fill="url(#ground)"/>

  <!-- Path to door -->
  <path d="M 400 600 L 360 510 L 440 510 Z" fill="#C9A878"/>
  <path d="M 400 600 L 365 520 L 435 520 Z" fill="#B8966A" opacity="0.6"/>

  <!-- House body -->
  <rect x="220" y="280" width="360" height="220" fill="url(#house)" stroke="#C9CFD6" stroke-width="2"/>

  <!-- Roof -->
  <polygon points="200,290 400,150 600,290" fill="url(#roof)" stroke="#8B2E2B" stroke-width="2"/>
  <!-- Roof eaves line -->
  <line x1="195" y1="290" x2="605" y2="290" stroke="#8B2E2B" stroke-width="3"/>

  <!-- Chimney -->
  <rect x="480" y="180" width="32" height="60" fill="#A89284" stroke="#7B6B5E" stroke-width="1.5"/>

  <!-- Door -->
  <rect x="370" y="380" width="60" height="120" rx="4" fill="#7B4F2E" stroke="#5C3A21" stroke-width="2"/>
  <circle cx="418" cy="442" r="3" fill="#E8C26B"/>

  <!-- Windows left -->
  <rect x="250" y="330" width="70" height="70" rx="4" fill="url(#window)" stroke="#5A6B7A" stroke-width="2"/>
  <line x1="285" y1="330" x2="285" y2="400" stroke="#5A6B7A" stroke-width="2"/>
  <line x1="250" y1="365" x2="320" y2="365" stroke="#5A6B7A" stroke-width="2"/>

  <!-- Window right -->
  <rect x="480" y="330" width="70" height="70" rx="4" fill="url(#window)" stroke="#5A6B7A" stroke-width="2"/>
  <line x1="515" y1="330" x2="515" y2="400" stroke="#5A6B7A" stroke-width="2"/>
  <line x1="480" y1="365" x2="550" y2="365" stroke="#5A6B7A" stroke-width="2"/>

  <!-- Bushes -->
  <ellipse cx="180" cy="500" rx="40" ry="22" fill="#5C8E52"/>
  <ellipse cx="200" cy="490" rx="28" ry="18" fill="#76A669"/>
  <ellipse cx="620" cy="500" rx="40" ry="22" fill="#5C8E52"/>
  <ellipse cx="600" cy="490" rx="28" ry="18" fill="#76A669"/>

  <!-- Tree left -->
  <rect x="80" y="430" width="14" height="70" fill="#7B5A3E"/>
  <circle cx="87" cy="415" r="38" fill="#5C8E52"/>
  <circle cx="65" cy="425" r="28" fill="#76A669"/>
  <circle cx="105" cy="420" r="26" fill="#6A9C5F"/>

  <!-- Tree right -->
  <rect x="710" y="440" width="12" height="60" fill="#7B5A3E"/>
  <circle cx="716" cy="425" r="32" fill="#5C8E52"/>
  <circle cx="700" cy="430" r="22" fill="#76A669"/>
</svg>